name: CI — Build Check (PRs)

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android-check:
    name: Android Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: ./gradlew assemblePlayStoreDebug --no-daemon

      - name: Run unit tests
        run: ./gradlew testPlayStoreDebugUnitTest --no-daemon

  backend-check:
    name: Backend Type Check & Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: backend
        run: npx vitest run

  dashboard-check:
    name: Dashboard Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/dashboard/package-lock.json

      - name: Install dependencies
        working-directory: backend/dashboard
        run: npm ci

      - name: Type check
        working-directory: backend/dashboard
        run: npm run typecheck

      - name: Build
        working-directory: backend/dashboard
        run: npm run build
